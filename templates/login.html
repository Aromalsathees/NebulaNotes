{% extends 'index.html' %}
{% load crispy_forms_tags %}

{% block header %}
{% endblock %}

{% block content %}

<div class="container mt-5">

    <form action="{% url 'login' %}" method="POST">

        {% csrf_token %}

        {{ form|crispy }}

        <button type="submit" class="btn btn-primary">
            Submit
        </button>

        <a href="{% url 'register' %}" class="btn btn-warning">
            Register
        </a>

    </form>

</div>

{% endblock %}
